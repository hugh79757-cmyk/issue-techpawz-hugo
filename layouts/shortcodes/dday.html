<div style="text-align:center; padding:20px;">
  <h2>❤️ 커플 디데이 계산기 ❤️</h2>

  <input type="date" id="startdate" style="padding:8px; font-size:16px;">
  <br><br>

  <button onclick="calculateLoveDays()" 
    style="padding:10px 20px; background:#ff69b4; color:white; border:none; border-radius:8px; cursor:pointer;">
    오늘은 몇일째? 💑
  </button>

  <p id="resultLoveDay" style="margin-top:20px; font-size:18px;"></p>
  <div id="anniversaryList"></div>
  <div id="shareLink"></div>
</div>

<script>
function calculateLoveDays() {
  const inputDate = document.getElementById("startdate").value;
  const result = document.getElementById("resultLoveDay");
  const anniversary = document.getElementById("anniversaryList");
  const share = document.getElementById("shareLink");

  if (!inputDate) {
    result.innerText = "사귄 날짜를 먼저 입력해 주세요!";
    return;
  }

  const start = new Date(inputDate);
  const today = new Date();
  const diffTime = today - start;
  const days = Math.floor(diffTime / (1000*60*60*24)) + 1;

  result.innerHTML = `❤️ 우리가 사귄 지 ${days}일째 되는 날이에요! ❤️`;

  const milestones = [100,200,300,365,500,1000];
  let html = "";

  milestones.forEach(day => {
    const future = new Date(start.getTime() + (day-1)*86400000);
    html += `✨ ${day}일: ${future.getFullYear()}-${future.getMonth()+1}-${future.getDate()}<br>`;
  });

  anniversary.innerHTML = html;

  const link = window.location.href.split('?')[0] + '?date=' + encodeURIComponent(inputDate);

  share.innerHTML = `
    <p>🔗 공유하기</p>
    <input type="text" id="copyLink" value="${link}" readonly style="width:90%; padding:6px;">
    <br><br>
    <button onclick="copyToClipboard()">📋 링크 복사</button>
    <p id="copyMsg"></p>
  `;
  // 하트 애니메이션
  for (let i = 0; i < 12; i++) {
    const heart = document.createElement('div');
    heart.innerHTML = ['💖','💕','❤️','💗','💓'][Math.floor(Math.random()*5)];
    Object.assign(heart.style, {
      position: 'fixed',
      top: Math.random() * window.innerHeight + 'px',
      left: Math.random() * window.innerWidth + 'px',
      fontSize: Math.random() * 20 + 20 + 'px',
      pointerEvents: 'none',
      zIndex: '9999',
      opacity: '0.85',
      animation: 'heartFloat 3s ease-out forwards'
    });
    document.body.appendChild(heart);
    setTimeout(() => { if (heart.parentNode) heart.parentNode.removeChild(heart); }, 3000);
  }
}

function copyToClipboard() {
  const input = document.getElementById("copyLink");
  input.select();
  document.execCommand("copy");
  document.getElementById("copyMsg").innerText = "복사 완료!";
}

window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const dateParam = params.get('date');

  if (dateParam) {
    document.getElementById("startdate").value = dateParam;
    calculateLoveDays();
  }
});
</script>
<style>
@keyframes heartFloat {
  0% { transform: translateY(0) scale(1); opacity: 0.85; }
  50% { transform: translateY(-60px) scale(1.2); opacity: 0.6; }
  100% { transform: translateY(-140px) scale(0.5); opacity: 0; }
}
</style>
